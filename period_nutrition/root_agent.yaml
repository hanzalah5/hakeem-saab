# yaml-language-server: $schema=https://raw.githubusercontent.com/google/adk-python/refs/heads/main/src/google/adk/agents/config_schemas/AgentConfig.json
#
# FemVerse period + nutrition specialist (single-agent app).
#
# `instruction` placeholders are filled at runtime:
#   {system_prompt?}  — period_nutrition_system.md + memory_extraction_guidance.md,
#                       injected by the `load_period_nutrition_prompt` callback.
#   {user_persona?}   — user profile pre-seeded into session state by the backend
#                       at session creation; empty string if unavailable.

agent_class: LlmAgent
name: period_nutrition_specialist
model: gemini-2.5-flash
description: >-
  Senior gynecology specialist covering menstrual cycles, hormones, PCOS,
  contraception, and fertility, who also factors the user's nutrition profile
  (dietary preferences, allergies, BMI, calorie targets) into her guidance.
instruction: "{system_prompt?}\n\n{user_persona?}"

tools:
  - name: load_memory

before_agent_callbacks:
  - name: femverse.core.callbacks.load_period_nutrition_prompt

# Persist the session to Memory Bank after every turn so health facts,
# preferences, and personal details accrue across conversations.
after_agent_callbacks:
  - name: femverse.core.callbacks.save_session_to_memory
