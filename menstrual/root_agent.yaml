# yaml-language-server: $schema=https://raw.githubusercontent.com/google/adk-python/refs/heads/main/src/google/adk/agents/config_schemas/AgentConfig.json
#
# FemVerse menstrual / gynecology specialist (single-agent app).
#
# `instruction` is filled at runtime by the `load_menstrual_prompt` callback:
#   {system_prompt?}  — menstrual_system.md + memory_extraction_guidance.md
#   {user_persona?}   — user profile fetched from Cassandra once per session
#                       and cached in session state; empty string if unavailable.

agent_class: LlmAgent
name: menstrual_specialist
model: gemini-2.5-flash
description: >-
  Senior gynecology specialist covering menstrual cycles, hormones, PCOS,
  contraception, fertility tracking, and general women's health for
  non-pregnant users.
instruction: "{system_prompt?}\n\n{user_persona?}"

tools:
  - name: load_memory

before_agent_callbacks:
  - name: femverse.core.callbacks.load_menstrual_prompt

# Persist the session to Memory Bank after every turn so health facts,
# preferences, and personal details accrue across conversations.
after_agent_callbacks:
  - name: femverse.core.callbacks.save_session_to_memory
#