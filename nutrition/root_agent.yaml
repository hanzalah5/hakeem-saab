# yaml-language-server: $schema=https://raw.githubusercontent.com/google/adk-python/refs/heads/main/src/google/adk/agents/config_schemas/AgentConfig.json
#
# FemVerse nutrition / dietary specialist (single-agent app).
#
# `instruction` placeholders are filled at runtime:
#   {system_prompt?}  — nutrition_system.md + memory_extraction_guidance.md,
#                       injected by the `load_nutrition_prompt` callback.
#   {user_persona?}   — optional formatted persona/summary pre-seeded into session
#                       state by the backend; empty string if unavailable.
#   {user_profile?}   — raw JSON of the module's attributes (profile, nutritional
#                       data, logged symptoms, etc.) pre-seeded into session state
#                       by the backend; empty string if unavailable.
#   {entry_context?}  — why the user opened this chat (tip / alert / story / …),
#                       seeded by the backend; empty string for a plain Chat Now.

agent_class: LlmAgent
name: nutrition_specialist
model: gemini-2.5-flash
description: >-
  Senior registered dietitian covering women's nutrition, calorie and macro
  targets, allergies and food preferences, and life-stage dietary needs across
  the menstrual cycle, pregnancy, and postpartum.
instruction: "{system_prompt?}\n\n## Long-term persona (background)\n{user_persona?}\n\n## Current session snapshot — today's profile, nutrition data, and logs (treat as current)\n{user_profile?}\n\n## Why the user opened this chat (entry context)\n{entry_context?}"

tools:
  - name: load_memory

before_agent_callbacks:
  - name: femverse.core.callbacks.load_nutrition_prompt

# Persist the session to Memory Bank after every turn so health facts,
# preferences, and personal details accrue across conversations.
after_agent_callbacks:
  - name: femverse.core.callbacks.save_session_to_memory
