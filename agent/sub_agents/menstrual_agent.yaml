# yaml-language-server: $schema=https://raw.githubusercontent.com/google/adk-python/refs/heads/main/src/google/adk/agents/config_schemas/AgentConfig.json
#
# Menstrual / gynecological specialist sub-agent.
# `instruction` is filled at runtime by the `load_menstrual_prompt` callback,
# which concatenates agent/prompts/menstrual_system.md with
# agent/prompts/memory_extraction_guidance.md.

agent_class: LlmAgent
name: menstrual_specialist
description: >-
  Senior gynecology specialist covering menstrual cycles, hormones, PCOS,
  contraception, fertility tracking, and general women's health for
  non-pregnant users.
instruction: "{system_prompt}"

tools:
  - name: agent.tools.user_data.fetch_user_persona
  - name: agent.tools.user_data.fetch_daily_logs
  - name: load_memory

# Allow the coordinator to hand control back to the pregnancy specialist
# if the conversation shifts mid-flow.
disallow_transfer_to_peers: false

before_agent_callbacks:
  - name: agent.core.callbacks.load_menstrual_prompt

# Persist the session to Memory Bank after every turn this specialist
# handles. Required because, once the coordinator transfers control here,
# subsequent turns no longer fire the coordinator's after_agent_callback.
after_agent_callbacks:
  - name: agent.core.callbacks.save_session_to_memory
